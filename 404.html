<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="logo/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
  <title>404 | JV Car Detailing</title>

  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#c0392b">

  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      padding: 2rem;
    }

    .error-page::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(192,57,43,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .error-content {
      position: relative;
      z-index: 1;
      max-width: 580px;
    }

    .error-logo {
      width: 130px;
      margin: 0 auto 2rem;
      filter: drop-shadow(0 0 14px rgba(192,57,43,0.4));
      opacity: 0;
      animation: fadeUp 0.9s 0.1s var(--ease-out) forwards;
    }

    .error-num {
      font-family: var(--font-hero);
      font-size: clamp(7rem, 22vw, 14rem);
      line-height: 0.85;
      color: transparent;
      -webkit-text-stroke: 2px rgba(192,57,43,0.35);
      letter-spacing: 0.05em;
      display: block;
      opacity: 0;
      animation: fadeUp 0.9s 0.25s var(--ease-out) forwards;
    }

    .error-car {
      font-size: 2.8rem;
      display: block;
      margin: 0.8rem 0;
      opacity: 0;
      animation: fadeUp 0.9s 0.4s var(--ease-out) forwards;
      filter: drop-shadow(0 0 10px rgba(192,57,43,0.4));
    }

    .error-title {
      font-family: var(--font-hero);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      letter-spacing: 0.06em;
      color: #fff;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.55s var(--ease-out) forwards;
    }

    .error-desc {
      color: var(--muted);
      font-size: 0.97rem;
      line-height: 1.8;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.7s var(--ease-out) forwards;
    }

    .error-desc strong { color: var(--red-bright); }

    .error-btns {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.9s 0.85s var(--ease-out) forwards;
    }

    .quick-links {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      opacity: 0;
      animation: fadeUp 0.9s 1s var(--ease-out) forwards;
    }

    .quick-links p {
      font-family: var(--font-ui);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--red-bright);
      margin-bottom: 1rem;
    }

    .quick-links-grid {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .quick-link {
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--border);
      font-family: var(--font-ui);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      clip-path: polygon(0 0, calc(100% - 7px) 0, 100% 7px, 100% 100%, 0 100%);
      transition: border-color 0.3s, color 0.3s, background 0.3s, transform 0.3s;
    }

    .quick-link:hover {
      border-color: var(--red);
      color: var(--text);
      background: rgba(192,57,43,0.08);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <div class="error-page">
    <div class="error-content">

      <img class="error-logo" src="logo/logo.png" alt="JV Car Detailing">

      <span class="error-num">404</span>

      <span class="error-car"></span>

      <h1 class="error-title">Página No Encontrada</h1>

      <p class="error-desc">
        Parece que esta página salió a dar una vuelta y no volvió.<br>
        No te preocupés, <strong>te llevamos de regreso</strong>.
      </p>

      <div class="error-btns">
        <a href="index.html" class="btn-primary">← Volver al Inicio</a>
        <a href="html/contacto.html" class="btn-secondary">Contactarnos</a>
      </div>

      <div class="quick-links">
        <p>¿A dónde querías ir?</p>
        <div class="quick-links-grid">
          <a href="html/servicios.html"  class="quick-link">Servicios</a>
          <a href="html/nosotros.html"   class="quick-link">Nosotros</a>
          <a href="html/contacto.html"   class="quick-link">Contacto</a>
          <a href="html/cotizacion.html" class="quick-link">Cotización</a>
        </div>
      </div>

    </div>
  </div>

  <a href="https://wa.me/50687944434" target="_blank" rel="noopener"
     class="whatsapp-float" aria-label="Contactar por WhatsApp">
    <img src="iconos/what.png" alt="WhatsApp">
    <span>Escríbenos</span>
  </a>

  <script src="script.js"></script>

</body>
</html>
